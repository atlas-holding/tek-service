apiVersion: apps/v1
kind: Deployment
metadata:
  name: tek-service
  labels:
    app: tek-service
    dxp.io/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tek-service
  template:
    metadata:
      labels:
        app: tek-service
        backstage.io/kubernetes-id: tek-service
    spec:
      nodeSelector:
        role: workload
      tolerations:
      - key: role
        operator: Equal
        value: workload
        effect: NoSchedule
      containers:
      - name: tek-service
        image: harbor.harbor.svc.cluster.local/dxp/tek-service:c063900
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tek-service
spec:
  selector:
    app: tek-service
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tek-service
  labels:
    app: tek-service
    dxp.io/managed: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: tek-service.68.221.5.247.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tek-service
            port:
              number: 80
